<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared File | FileShield</title>

<style>
    :root {
      --primary: #4da3ff;
      --primary-hover: #3a8be0;
      --bg-dark: #0d1b2a;
      --card-bg: rgba(27, 43, 68, 0.7);
      --header-bg: #08111f;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
    }
  
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: radial-gradient(circle at top right, #1b263b, #0d1b2a);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  
    /* HEADER */
    header {
      display: flex;
      justify-content: center; /* Centered logo for a landing-page feel */
      align-items: center;
      padding: 20px 40px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
  
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
    }
  
    /* MAIN CONTAINER */
    .container {
      max-width: 800px;
      width: 90%;
      margin: 60px auto;
      flex: 1;
    }
  
    /* CARD */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.5s ease-out;
    }
  
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  
    /* FILE INFO */
    .file-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
  
    .icon {
      font-size: 50px;
      background: rgba(77, 163, 255, 0.1);
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 1px solid rgba(77, 163, 255, 0.2);
    }
  
    .name {
      font-size: 22px;
      font-weight: 700;
      word-break: break-all;
      color: #ffffff;
    }
  
    .meta {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 6px;
    }
  
    /* PREVIEW AREA */
    .preview {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      overflow: hidden;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
  
    .preview img {
      max-width: 100%;
      display: block;
    }
  
    .preview iframe {
      width: 100%;
      height: 450px;
      border: none;
    }
  
    .preview video {
      width: 100%;
      max-height: 450px;
      outline: none;
    }
  
    /* ACTIONS */
    .actions {
      margin-top: 40px;
      text-align: center;
    }
  
    button {
      background: var(--primary);
      border: none;
      padding: 16px 40px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(77, 163, 255, 0.3);
      width: 100%;
      max-width: 300px;
    }
  
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(77, 163, 255, 0.4);
    }
  
    button:active {
      transform: translateY(0);
    }
  
    /* MOBILE TWEAKS */
    @media (max-width: 600px) {
      header {
        padding: 15px;
      }
  
      .container {
        margin: 20px auto;
      }
  
      .card {
        padding: 25px;
      }
  
      .file-header {
        flex-direction: column;
        text-align: center;
        gap: 15px;
      }
  
      .icon {
        width: 60px;
        height: 60px;
        font-size: 30px;
      }
  
      .name {
        font-size: 18px;
      }
  
      .preview iframe {
        height: 300px;
      }
    }
  </style>
</head>

<body>

<header>
<div class="logo">FileShield</div>
</header>

<div class="container">

<div class="card">

<div class="file-header">

<div class="icon"></div>

<div>
<div class="name" id="fileName">Loading...</div>
<div class="meta" id="fileMeta"></div>
</div>

</div>

<div class="preview" id="previewArea"></div>

<div class="actions">
<button onclick="downloadFile()">Download</button>
</div>

</div>

</div>

<script src="js/share.js"></script>

</body>
</html>
