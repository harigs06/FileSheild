<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileShield Profile</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* Container */
.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

/* Card */
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

/* Headings */
h2, h3{
    margin-top:0;
}

/* Profile info */
.info p{
    margin:8px 0;
}

/* Progress bar */
.progress{
    background:#334155;
    border-radius:10px;
    overflow:hidden;
    height:20px;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    background:#38bdf8;
    width:0%;
    transition:0.4s;
}

/* Form */
.form-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:5px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

/* Loader */
.loader{
    text-align:center;
    margin-top:100px;
    font-size:18px;
    color:#cbd5f5;
}
</style>

</head>
<body>

<div class="container">

    <!-- Loader -->
    <div id="loader" class="loader">
        Loading profile...
    </div>

    <!-- Content -->
    <div id="content" style="display:none;">

        <!-- Profile Info -->
        <div class="card info">
            <h2>👤 Profile</h2>
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
        </div>

        <!-- Storage -->
        <div class="card">
            <h3>💾 Storage Usage</h3>

            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <p id="storageText"></p>
        </div>

        <!-- Update Section -->
        <div class="card">
            <h3>✏️ Update Profile</h3>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="newName" placeholder="Enter new name">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Minimum 6 characters">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password">
            </div>

            <button onclick="updateProfile()">Update Profile</button>
        </div>

    </div>
</div>

<script>

// Load profile on page load
window.onload = function () {
    loadProfile();
};

function loadProfile(){

    fetch("/FileSheild/backend-php/profile.php", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("auth_token")
        }
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("loader").style.display = "none";
        document.getElementById("content").style.display = "block";

        document.getElementById("name").innerText =
            data.first_name + " " + data.last_name;

        document.getElementById("email").innerText = data.email;

        const percent = (data.used_storage / data.max_storage) * 100;

        document.getElementById("progressBar").style.width = percent + "%";

        document.getElementById("storageText").innerText =
            (data.used_storage / (1024*1024)).toFixed(2) + " MB / 1024 MB used";

    })
    .catch(err => {
        console.error(err);
        alert("Failed to load profile");
    });
}


// Update profile
function updateProfile(){

    const name = document.getElementById("newName").value.trim();
    const pass = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if(pass && pass.length < 6){
        alert("Password must be at least 6 characters");
        return;
    }

    if(pass !== confirm){
        alert("Passwords do not match");
        return;
    }

    let first = "";
    let last = "";

    if(name){
        const parts = name.split(" ");
        first = parts[0];
        last = parts.slice(1).join(" ");
    }

    fetch("/FileSheild/backend-php/profile.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("auth_token")
        },
        body: JSON.stringify({
            first_name: first,
            last_name: last,
            password: pass
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        loadProfile(); // refresh after update
    });
}

</script>

</body>
</html>
