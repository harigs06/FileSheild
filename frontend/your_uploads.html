<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | FileShield</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0d1b2a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#08111f;
}

.logo{
font-size:22px;
font-weight:bold;
color:#4da3ff;
}

.nav{
display:flex;
gap:20px;
}

.nav a{
color:white;
text-decoration:none;
font-size:14px;
opacity:0.8;
}

.nav a:hover{
opacity:1;
}

/* CONTAINER */

.container{
padding:40px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:25px;
align-items:center;
}

.title{
font-size:28px;
}

.search-box{
padding:10px;
border-radius:8px;
border:none;
width:250px;
background:#1c2d48;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:#1b2b44;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
background:#243a5e;
transform:translateY(-5px);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.name{
font-size:15px;
margin-bottom:12px;
}

/* BUTTONS */

.buttons{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.preview{background:#00c896;color:white;}
.download{background:#4da3ff;color:white;}
.share{background:#9b59ff;color:white;}
.delete{background:#ff4d4d;color:white;}
.open{background:#ffaa00;color:white;}

.section{
margin-bottom:50px;
}

</style>

</head>

<body>

<header>

<div class="logo">FileShield</div>

<div class="nav">
<a href="../home.html">Home</a>
<a href="upload.html">Upload</a>

</div>

</header>


<div class="container">
<div id="breadcrumb" style="margin-bottom:20px;font-size:14px;opacity:0.8;"></div>
<!-- FOLDERS -->

<div class="section">

<div class="top-bar">

<div class="title">Folders</div>

<input type="text" id="searchFolder" class="search-box"
placeholder="Search folders...">

</div>

<div class="grid" id="foldersList"></div>

</div>


<!-- FILES -->

<div class="section">

<div class="top-bar">

<div class="title">Files</div>

<input type="text" id="searchFile" class="search-box"
placeholder="Search files...">

</div>

<div class="grid" id="filesList"></div>

</div>

</div>


<script src="js/dashboard.js"></script>

</body>
</html>
