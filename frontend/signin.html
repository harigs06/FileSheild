<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>

html, body {
    height: 100%;
}

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background-color:#e6f2ff;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box{
    width:320px;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

input[type="submit"]{
    width:100%;
    padding:10px;
    background-color:#007bff;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

input[type="submit"]:hover{
    background-color:#0056b3;
}

.forgot{
    text-align:right;
    font-size:13px;
}

.or{
    text-align:center;
    margin:15px 0;
    font-weight:bold;
}

.google-btn{
    width:100%;
    padding:10px;
    background:white;
    border:1px solid #ccc;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.google-btn:hover{
    background:#f5f5f5;
}

/* 🔥 LOADER */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    z-index: 9999;
}

.spinner {
    width: 30px;
    height: 30px;
    border: 4px solid #ccc;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

</style>

<script>

function handleforgot(){
    let email = document.getElementById("email").value;
    let loader = document.getElementById("loader");
    let link = document.querySelector(".forgot a");

    if(email == ""){
        alert("Email is required");
        return false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){
        alert("Enter valid email");
        return false;
    }

    loader.style.display = "flex";
    link.style.pointerEvents = "none";

    fetch("/FileSheild/backend-php/forgot.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "email=" + encodeURIComponent(email)
    })
    .then(response => response.json())
    .then(data => {
        loader.style.display = "none";
        link.style.pointerEvents = "auto";

        alert(data.message);
    })
    .catch(error => {
        loader.style.display = "none";
        link.style.pointerEvents = "auto";

        alert("Something went wrong");
    });

    return false;
}

function loginUser(event) {
    event.preventDefault(); // stop default form submit

    let email = document.getElementById("email").value;
    let password = document.getElementById("pass").value;

    if (!validateLogin()) return false;

    fetch("/FileSheild/backend-php/login.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password)
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {

            localStorage.setItem("auth_token", data.token);
            localStorage.setItem("name", data.first_name);
            localStorage.setItem("is_verified",data.is_verified);
            localStorage.setItem("email",data.email);
            localStorage.setItem("second_name",data.second_name);
            localStorage.setItem("user_id",data.user_id);

            window.location.href = "/FileSheild/home.html";

        } else {
            alert(data.message);
        }

    })
    .catch(err => {
        alert("Login failed");
        console.error(err);
    });

    return false;
}

function validateLogin(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("pass").value;

    if(email == ""){
        alert("Email is required");
        return false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){
        alert("Enter valid email");
        return false;
    }

    if(password == ""){
        alert("Password is required");
        return false;
    }

    return true;
}

</script>

</head>

<body>

<div class="container">
<div class="form-box">

<h1>Sign In</h1>

<form onsubmit="return loginUser(event)">

<label>Email :</label>
<input type="text" name="email" id="email" placeholder="Enter your email">

<label>Password :</label>
<input type="password" name="password" id="pass" placeholder="Enter your password">

<div class="forgot">
<a href="#" onclick="return handleforgot()">Forgot password?</a>
</div>

<br>
<h5 style="text-align: center;">
Doesn't have a Account? <a href="signup.html">Register</a>
</h5>

<input type="submit" value="Login">

</form>

<div class="or">OR</div>

<a href="/FileSheild/backend-php/googlelogin.php" style="text-decoration:none;">
    <button class="google-btn">
        <span class="google-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18"> 
                <path fill="#EA4335" d="M24 9.5c3.2 0 6.1 1.1 8.3 3.2l6.2-6.2C34.9 2.8 29.8 1 24 1 14.8 1 6.9 6.6 3.4 14.5l7.3 5.7C12.6 13.5 17.8 9.5 24 9.5z"/> 
                <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-2.7-.4-3.9H24v7.4h12.7c-.3 2-1.5 4.9-4.3 6.9l6.6 5.1c3.9-3.6 6.5-8.9 6.5-15.5z"/> 
                <path fill="#FBBC05" d="M10.7 28.2c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.3-5.7C1.2 16.7 0 20.2 0 23.5s1.2 6.8 3.4 9.4l7.3-5.7z"/>
                 <path fill="#34A853" d="M24 46c6.5 0 11.9-2.1 15.9-5.7l-6.6-5.1c-1.8 1.2-4.3 2.1-9.3 2.1-6.2 0-11.4-4-13.3-9.6l-7.3 5.7C6.9 41.4 14.8 46 24 46z"/> </svg> 
        </span>
        <span style="margin-left:10px;">Continue with Google</span>
    </button>
</a>

</div>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p>Sending reset link...</p>
</div>

</body>
</html>
